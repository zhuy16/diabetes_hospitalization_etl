name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run parser robustness test
        run: python tests/test_parse_hl7v2_parser.py

      - name: Run Phase II workflow
        run: bash scripts/run_phase2.sh

      - name: Run Phase III workflow
        run: bash scripts/run_phase3.sh
